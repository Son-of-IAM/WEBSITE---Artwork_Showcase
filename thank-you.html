<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You | Son_of_IAM_</title>
<link rel="icon" type="image/png" href="Images/LOGO.PNG">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --color-dominant: #7205cd;
    --color-compliment: #5D7FFF;
    --bg-white: #ffffff;
    --bg-light: #fafafa;
    --text-dark: #1a1a1a;
    --text-muted: #666666;
    --border-light: #e0e0e0;
    --font-primary: 'Optima', 'Segoe UI', sans-serif;
    --font-secondary: 'Georgia', 'Times New Roman', serif;
    --font-handwriting: 'Caveat', cursive;
  }
  [data-theme="dark"] {
    --bg-white: #0a0a0a;
    --bg-light: #111111;
    --text-dark: #f0f0f0;
    --text-muted: #999999;
    --border-light: #2a2a2a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: var(--font-secondary);
    color: var(--text-dark);
    background: var(--bg-white);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 5%;
    text-align: center;
    transition: background-color 0.5s, color 0.5s;
    overflow: hidden;
  }
  a { text-decoration: none; color: inherit; }

  /* Ambient background */
  body::before {
    content: '';
    position: fixed;
    top: 50%; left: 50%;
    width: 600px; height: 600px;
    transform: translate(-50%, -50%);
    background: radial-gradient(ellipse, rgba(114,5,205,0.07) 0%, transparent 70%);
    pointer-events: none;
    animation: bgPulse 5s ease-in-out infinite;
  }
  @keyframes bgPulse {
    0%, 100% { transform: translate(-50%,-50%) scale(1); opacity: 0.7; }
    50% { transform: translate(-50%,-50%) scale(1.2); opacity: 1; }
  }

  /* ── CHECKMARK ANIMATION ── */
  .check-wrapper {
    width: 90px; height: 90px;
    margin: 0 auto 2.5rem;
    position: relative;
  }
  .check-circle {
    width: 90px; height: 90px;
    border-radius: 50%;
    background: linear-gradient(135deg, rgba(114,5,205,0.12), rgba(93,127,255,0.08));
    border: 2px solid rgba(114,5,205,0.3);
    display: flex; align-items: center; justify-content: center;
    animation: circleIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
  }
  @keyframes circleIn {
    from { transform: scale(0); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }
  .check-symbol {
    font-size: 2.2rem;
    animation: checkIn 0.4s ease 0.4s both;
  }
  @keyframes checkIn {
    from { transform: scale(0) rotate(-30deg); opacity: 0; }
    to   { transform: scale(1) rotate(0); opacity: 1; }
  }

  /* ── TEXT ── */
  .eyebrow {
    font-family: var(--font-primary);
    font-size: 0.72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 4px;
    color: var(--color-dominant);
    margin-bottom: 1rem;
    opacity: 0;
    animation: fadeUp 0.7s ease 0.5s forwards;
  }
  .thank-you-title {
    font-family: var(--font-primary);
    font-size: clamp(2.8rem, 6vw, 5rem);
    font-weight: 700;
    text-transform: uppercase;
    line-height: 1.05;
    margin-bottom: 1.5rem;
    opacity: 0;
    animation: fadeUp 0.7s ease 0.6s forwards;
  }
  .thank-you-verse {
    font-family: var(--font-handwriting);
    font-size: 1.35rem;
    color: var(--text-muted);
    max-width: 460px;
    margin: 0 auto 0.5rem;
    line-height: 1.7;
    font-style: italic;
    opacity: 0;
    animation: fadeUp 0.7s ease 0.75s forwards;
  }
  .thank-you-verse-ref {
    font-family: var(--font-primary);
    font-size: 0.72rem;
    color: var(--color-dominant);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 2.5rem;
    opacity: 0;
    animation: fadeUp 0.7s ease 0.85s forwards;
  }
  .thank-you-body {
    font-size: 1.05rem;
    color: var(--text-muted);
    max-width: 440px;
    margin: 0 auto 3rem;
    line-height: 1.8;
    opacity: 0;
    animation: fadeUp 0.7s ease 0.9s forwards;
  }

  /* ── BUTTONS ── */
  .action-buttons {
    display: flex;
    gap: 1rem;
    justify-content: center;
    flex-wrap: wrap;
    opacity: 0;
    animation: fadeUp 0.7s ease 1s forwards;
  }
  .btn-cta {
    display: inline-block;
    padding: 0.9rem 2.2rem;
    background: var(--color-dominant);
    color: white;
    border-radius: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    font-family: var(--font-primary);
    font-size: 0.82rem;
    transition: all 0.3s;
  }
  .btn-cta:hover { background: var(--color-compliment); transform: translateY(-2px); }
  .btn-outline {
    display: inline-block;
    padding: 0.9rem 2.2rem;
    border: 1.5px solid var(--border-light);
    border-radius: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    font-family: var(--font-primary);
    font-size: 0.82rem;
    transition: all 0.3s;
    color: var(--text-muted);
  }
  .btn-outline:hover { border-color: var(--color-dominant); color: var(--color-dominant); transform: translateY(-2px); }

  /* Social row */
  .social-row {
    display: flex;
    gap: 0.8rem;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 2.5rem;
    opacity: 0;
    animation: fadeUp 0.7s ease 1.1s forwards;
  }
  .social-pill {
    display: inline-block;
    padding: 0.5rem 1.2rem;
    border: 1px solid var(--border-light);
    border-radius: 30px;
    font-size: 0.75rem;
    font-family: var(--font-primary);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
    transition: all 0.3s;
  }
  .social-pill:hover { border-color: var(--color-dominant); color: var(--color-dominant); transform: translateY(-2px); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 480px) {
    .action-buttons { flex-direction: column; align-items: center; }
    .btn-cta, .btn-outline { width: 100%; text-align: center; }
  }
</style>
</head>
<body>

  <div class="check-wrapper">
    <div class="check-circle">
      <span class="check-symbol">✦</span>
    </div>
  </div>

  <p class="eyebrow">Message Received</p>

  <h1 class="thank-you-title">Thank You</h1>

  <p class="thank-you-verse">"The Lord is near to all who call on him."</p>
  <p class="thank-you-verse-ref">Psalm 145:18</p>

  <p class="thank-you-body">
    Your message has been received. I'll be in touch with you shortly, 
    and grateful you took the time to connect.
  </p>

  <div class="action-buttons">
    <a href="work.html" class="btn-cta">View the Work →</a>
    <a href="index.html" class="btn-outline">Back to Home</a>
  </div>

  <div class="social-row">
    <a href="https://instagram.com/son_of_iam_" target="_blank" class="social-pill">Instagram</a>
    <a href="https://x.com/son_of_iam_?s=21" target="_blank" class="social-pill">X (Twitter)</a>
    <a href="https://www.tiktok.com/@son_of_iam_?_t=zs-9032ktsad1b&_r=1" target="_blank" class="social-pill">TikTok</a>
  </div>

<script>
  // Theme persistence
  const root = document.documentElement;
  const saved = localStorage.getItem('theme');
  if (saved === 'dark') root.setAttribute('data-theme', 'dark');
  else if (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches) root.setAttribute('data-theme', 'dark');
</script>
</body>
</html>
