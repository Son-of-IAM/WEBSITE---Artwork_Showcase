backend:
  name: github
  repo: Son-of-IAM/WEBSITE---Artwork_Showcase
  branch: main

media_folder: "Images/artworks"
public_folder: "Images/artworks"
publish_mode: editorial_workflow

collections:
  - name: "artworks"
    label: "Artworks"
    folder: "data/artworks"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string", required: true}
      - {label: "Category", name: "category", widget: "select", options: ["paintings", "3d-art", "gospel", "old"], required: true}
      - {label: "Main Image", name: "image", widget: "image", required: true}
      - {label: "Cropped Detail", name: "cropImage", widget: "image", required: false}
      - {label: "Description", name: "description", widget: "text", required: false}
